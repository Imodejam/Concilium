version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: concilium-api:dev
    env_file: .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    ports:
      - "7001:7001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: concilium-web:dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://api:7001}
    ports:
      - "7002:80"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    image: concilium-bot:dev
    env_file: .env
    environment:
      CONCILIUM_API_URL: http://api:7001
    depends_on:
      - api
    restart: unless-stopped
